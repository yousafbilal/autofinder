# ============================================
# Production-Grade Nginx Configuration
# For AutoFinder Backend (Node.js on port 8001)
# COPY THIS ENTIRE FILE to server: /etc/nginx/sites-available/autofinder-backend
# ============================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Block suspicious user agents
map $http_user_agent $block_bot {
    default 0;
    ~*bot 1;
    ~*crawler 1;
    ~*spider 1;
    ~*scraper 1;
    ~*curl 1;
    ~*wget 1;
    ~*python 1;
    ~*java 1;
    ~*go-http 1;
    ~*httpie 1;
    ~*postman 1;
    ~*insomnia 1;
    ~*ahrefs 1;
    ~*semrush 1;
    ~*majestic 1;
    ~*dotbot 1;
    ~*mj12bot 1;
    ~*blexbot 1;
    ~*petalbot 1;
    ~*megaindex 1;
    ~*sogou 1;
    ~*yandex 1;
    ~*baidu 1;
    "" 1;
}

# Block suspicious IPs (add your own)
geo $block_ip {
    default 0;
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.autofinder.pk;

    # Request size limit - allow large image uploads (100MB)
    client_max_body_size 100M;
    client_body_buffer_size 256k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # Logging
    access_log /var/log/nginx/autofinder-backend-access.log;
    error_log /var/log/nginx/autofinder-backend-error.log warn;

    if ($block_bot) { return 403; }
    if ($block_ip) { return 403; }
    limit_conn conn_limit 20;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
    location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|bak|backup|old|orig|save|swp|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location /uploads {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    location ~ ^/(api/)?(auth/login|auth/register|mobile/auth/login|mobile/auth/register) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~ ^/(free_ads|featured_ads|bike_ads|rent_car|autoparts|list_it_for_you_ad|signup|edit-profile-pic|payment|inspection|buy_car-for_me|blogs|videos|advertising) {
        client_max_body_size 100M;
        limit_req zone=upload_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Accept-Encoding "";
    }

    location /health {
        access_log off;
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;
    location = /403.html { root /usr/share/nginx/html; internal; }
    location = /404.html { root /usr/share/nginx/html; internal; }
    location = /429.html { root /usr/share/nginx/html; internal; }
    location = /50x.html { root /usr/share/nginx/html; internal; }
}

# ========== HTTPS (port 443) - same config + SSL + 100M upload ==========
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backend.autofinder.pk;

    client_max_body_size 100M;
    client_body_buffer_size 256k;

    ssl_certificate /etc/letsencrypt/live/backend.autofinder.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.autofinder.pk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
